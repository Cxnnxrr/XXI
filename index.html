<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XXI</title>

    <link rel="icon" href="Imagenes/icon.png" type="image/png" />

    <style>
        @font-face {
            font-family: 'UniSans';
            src: url('Fuentes/UniSans.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background-color: #000000;
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- CONTENEDOR GENERAL QUE SE SACUDE --- */
        .contenido-principal {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 1;
            will-change: transform;
        }

        /* --- BOTÓN MÚSICA ARRIBA A LA DERECHA --- */
        .btn-musica {
            position: fixed;
            top: 18px;
            right: 18px;
            width: 42px;
            height: 42px;
            padding: 0;
            border: none;
            background: transparent;
            cursor: pointer;
            z-index: 70;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .btn-musica:hover {
            transform: scale(1.08);
            opacity: 0.9;
        }

        .btn-musica img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* --- HALO NEÓN AL ACERTAR --- */
        .halo-neon {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 45;
            opacity: 0;
            transition: opacity 0.25s ease;
            box-shadow:
                inset 0 0 35px rgba(255, 20, 147, 0.55),
                inset 0 0 85px rgba(255, 20, 147, 0.32),
                inset 0 0 160px rgba(255, 20, 147, 0.16);
            mix-blend-mode: screen;
        }

        .halo-neon.mostrar-halo {
            opacity: 1;
        }

        /* --- TEMBLOR BRUSCO --- */
        @keyframes sacudirPantalla {
            0%   { transform: translate3d(0, 0, 0); }
            10%  { transform: translate3d(-8px, 4px, 0); }
            20%  { transform: translate3d(7px, -5px, 0); }
            30%  { transform: translate3d(-6px, 4px, 0); }
            40%  { transform: translate3d(6px, -3px, 0); }
            50%  { transform: translate3d(-4px, 2px, 0); }
            60%  { transform: translate3d(4px, -2px, 0); }
            70%  { transform: translate3d(-3px, 1px, 0); }
            80%  { transform: translate3d(3px, -1px, 0); }
            90%  { transform: translate3d(-1px, 0px, 0); }
            100% { transform: translate3d(0, 0, 0); }
        }

        .contenido-principal.temblor-activo {
            animation: sacudirPantalla 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        /* --- PARTÍCULAS DE FONDO --- */
        .particulas-layer {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .particulas-layer.particulas-final {
            position: absolute;
            inset: 0;
        }

        .particula {
            position: absolute;
            border-radius: 50%;
            opacity: 0.18;
            filter: blur(0.3px);
            animation-name: flotarParticula;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            will-change: transform, opacity;
        }

        @keyframes flotarParticula {
            0% {
                transform: translate3d(0, 0, 0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: var(--opacidad, 0.18);
            }
            50% {
                opacity: calc(var(--opacidad, 0.18) + 0.08);
            }
            90% {
                opacity: var(--opacidad, 0.18);
            }
            100% {
                transform: translate3d(var(--dx, 0px), var(--dy, -120px), 0) scale(1.08);
                opacity: 0;
            }
        }

        /* --- ESCENA DESLIZABLE --- */
        .escena {
            width: 200vw;
            height: 100vh;
            display: flex;
            transform: translateX(0);
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            z-index: 1;
        }

        .escena.mostrar-final {
            transform: translateX(-100vw);
        }

        .pantalla {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .pantalla-inicial {
            overflow: hidden;
        }

        .pantalla-final {
            background-color: #000000;
            overflow: hidden;
        }

        /* --- BOTÓN VOLVER GENERAL --- */
        .btn-volver {
            position: fixed;
            top: 30px;
            left: 30px;
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 10px 25px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px);
            transition: opacity 0.4s ease, transform 0.4s ease, background-color 0.4s ease, color 0.4s ease;
        }

        .btn-volver:hover {
            background-color: #ffffff;
            color: #000000;
        }

        .mostrar-volver {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        /* --- BOTÓN PRINCIPAL --- */
        .btn-empezar {
            position: relative;
            z-index: 100;
            pointer-events: auto;

            background-color: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.4s ease, color 0.4s ease, opacity 0.5s ease, transform 0.5s ease;
            opacity: 0;
            transform: translateY(10px) scale(0.98);
        }

        .btn-empezar.aparecer {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .btn-empezar.ocultar {
            opacity: 0;
            transform: translateY(10px) scale(0.98);
            pointer-events: none;
        }

        .btn-empezar:hover {
            background-color: #ffffff;
            color: #000000;
        }

        /* --- CONTENEDOR DE PILARES --- */
        .contenedor-secciones {
            display: none;
            flex-direction: row;
            gap: 20px;
            width: min(1200px, calc(100vw - 40px));
            height: 60vh;
            position: relative;
            align-items: stretch;
        }

        .mostrar-contenedor {
            display: flex;
        }

        /* --- LAS 5 SECCIONES (PILARES VERTICALES) --- */
        .seccion-card {
            box-sizing: border-box;
            flex: 1;
            background-color: #000000;
            border: 2px solid #ffffff;
            border-radius: 15px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transform: translateY(40px);
            position: relative;
            z-index: 10;
            transition: opacity 0.4s ease, transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease;
            overflow: hidden;
        }

        .seccion-card:hover {
            transform: scale(1.05) translateY(0) !important;
            box-shadow: 0 10px 15px rgba(255, 20, 147, 0.5);
            z-index: 15;
        }

        .seccion-card.fijar-hover {
            transform: scale(1.05) translateY(0) !important;
            box-shadow: 0 10px 15px rgba(255, 20, 147, 0.5);
            z-index: 15;
            pointer-events: none;
        }

        .animar-seccion {
            opacity: 1;
            transform: translateY(0);
        }

        .desvanecer-pilar {
            opacity: 0 !important;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.4s ease, visibility 0.4s;
        }

        .pilar-bloqueado .titulo-pilar,
        .pilar-bloqueado .img-pilar {
            filter: brightness(0.25) grayscale(1);
            opacity: 0.35;
        }

        .pilar-bloqueado .btn-entrar {
            border-color: #555555;
            background-color: #000000;
            cursor: not-allowed;
        }

        /* --- RECUADRO DEL PUZZLE CORREDIZO --- */
        .seccion-puzzle-corrediza {
            box-sizing: border-box;
            position: absolute;
            width: calc(((100% - 80px) / 5) * 3 + 40px);
            height: 100%;
            background-color: #000000;
            border: 2px solid #ffffff;
            border-radius: 15px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            left: 0;
            top: 0;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            transform: translateX(0);
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease, box-shadow 0.3s ease;
        }

        .seccion-puzzle-corrediza.deslizar-puerta {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(calc(((100% - 80px) / 5) + 20px)) !important;
            box-shadow: 0 10px 15px rgba(255, 20, 147, 0.3);
        }

        /* --- FLECHAS ABAJO CENTRADAS Y PEQUEÑAS --- */
        .btn-flecha-final,
        .btn-flecha-regresar {
            position: absolute;
            left: 50%;
            bottom: 8px;
            transform: translateX(-50%);
            background-color: #000000;
            border: 2px solid #ffffff;
            border-radius: 50%;
            width: 54px;
            height: 54px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 30;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, background-color 0.3s ease, opacity 0.3s ease;
        }

        .btn-flecha-final {
            opacity: 0;
            pointer-events: none;
        }

        .btn-flecha-final:hover,
        .btn-flecha-regresar:hover {
            transform: translateX(-50%) scale(1.12);
            background-color: #ffffff;
        }

        .btn-flecha-final:hover .img-flecha-final,
        .btn-flecha-regresar:hover .img-flecha-final {
            filter: invert(1);
        }

        .mostrar-flecha-final {
            opacity: 1;
            pointer-events: auto;
        }

        .img-flecha-final {
            width: 22px;
            height: 22px;
            object-fit: contain;
            transition: filter 0.3s ease;
        }

        .flecha-izquierda {
            transform: rotate(180deg);
        }

        .flecha-derecha {
            transform: rotate(0deg);
        }

        /* --- BOTÓN FLECHA LATERAL --- */
        .btn-retraer {
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            background-color: #000000;
            border: 2px solid #ffffff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 25;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
        }

        .btn-retraer:hover {
            transform: translateY(-50%) scale(1.15);
            background-color: #ffffff;
        }

        .btn-retraer:hover .img-flecha {
            filter: invert(1);
        }

        .img-flecha {
            width: 18px;
            height: 18px;
            object-fit: contain;
            filter: invert(0);
            transform: rotate(0deg);
            transition: filter 0.3s ease;
        }

        /* --- TÍTULO --- */
        .titulo-pilar {
            color: #ffffff;
            font-family: 'UniSans', sans-serif;
            font-size: 2.4rem;
            font-weight: normal;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-align: center;
            text-transform: uppercase;
        }

        /* --- IMAGEN PILAR --- */
        .img-pilar {
            width: 95%;
            max-height: 200px;
            object-fit: contain;
            margin-bottom: auto;
        }

        /* --- BOTÓN GENERAL --- */
        .btn-entrar {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 10px 0;
            width: 80%;
            max-width: 150px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 30px;
            cursor: pointer;
            text-align: center;
            margin-top: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
        }

        .btn-entrar:hover:not(.bloqueado) {
            background-color: #ffffff;
            color: #000000;
        }

        .img-candado {
            height: 20px;
            object-fit: contain;
            filter: invert(0.4);
        }

        /* --- TEXTOS PUZZLE --- */
        .feedback {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            min-height: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .iconos-sociales {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .icono-social {
            width: 36px;
            height: 36px;
            object-fit: contain;
            display: block;
            transition: transform 0.25s ease, opacity 0.25s ease;
        }

        .icono-social:hover {
            transform: scale(1.12);
            opacity: 0.9;
        }

        .input-puzzle {
            width: 100%;
            padding: 14px 20px;
            background-color: #000000;
            border: 2px solid #ffffff;
            border-radius: 30px;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-puzzle:focus {
            border-color: #ff1493;
            box-shadow: 0 0 0 3px rgba(255, 20, 147, 0.15);
        }

        .bloque-input {
            width: 80%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .codigo-bloque {
            font-size: 1.05rem;
            color: #00ffcc;
            letter-spacing: 4px;
            font-family: monospace;
            text-align: center;
            line-height: 1.8;
            word-break: break-word;
        }

        .panel-final {
            width: min(620px, 88vw);
            min-height: 320px;
            border: 2px solid #ffffff;
            border-radius: 18px;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 28px 22px;
            gap: 22px;
            box-shadow: 0 10px 15px rgba(255, 20, 147, 0.2);
        }

        .panel-final .titulo-pilar {
            font-size: 2rem;
            margin-bottom: 0;
            text-transform: none;
        }

        .panel-final .bloque-input {
            width: min(420px, 90%);
            margin-bottom: 0;
        }

        .mensaje-final {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            min-height: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .links-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 16px;
        }

        .links-wrap .btn-entrar {
            width: 100%;
            max-width: 180px;
        }
    </style>
</head>
<body>

    <div class="particulas-layer" id="particulasLayer"></div>

    <div class="contenido-principal" id="contenidoPrincipal">
        <button class="btn-volver" id="btnVolver">Volver</button>

        <button type="button" class="btn-musica" id="btnMusica" title="Mutear música" aria-label="Mutear música">
            <img id="iconoMusica" src="Imagenes/SAC.png" alt="Música activa" />
        </button>

        <div class="halo-neon" id="haloNeon"></div>

        <audio id="musicaAmbiente" src="Audios/Nature Hug.mp3" loop preload="auto"></audio>
        <audio id="musicaFinal" src="Audios/The Sound of Myself.mp3" loop preload="auto"></audio>
        <audio id="sonidoError" src="Audios/Error.mp3" preload="auto"></audio>
        <audio id="sonidoDesbloqueo" src="Audios/Desbloqueo.mp3" preload="auto"></audio>

        <div class="escena" id="escena">

            <!-- PANTALLA INICIAL -->
            <section class="pantalla pantalla-inicial">
                <button type="button" class="btn-empezar" id="btnEmpezar">Empezar</button>

                <div class="contenedor-secciones" id="contenedorSecciones">

                    <!-- PUZZLE 1 -->
                    <div class="seccion-puzzle-corrediza" id="puzzleCorredizo1">
                        <button type="button" class="btn-retraer" id="btnRetraerPuzzle1" title="Esconder puzzle">
                            <img src="Imagenes/flecha.png" alt="Retraer" class="img-flecha" />
                        </button>

                        <h3 class="titulo-pilar" style="color: #ff1493; margin-top: 10px; margin-bottom: 20px;">Puzzle 1</h3>

                        <a href="Imagenes/bdjx.jpeg" download="bdjx.jpeg" style="display: block; margin-bottom: 20px; text-decoration: none;">
                            <button type="button" class="btn-entrar" style="width: auto; padding: 10px 20px; font-size: 0.8rem;">Descargar</button>
                        </a>

                        <div style="width: 80%; max-width: 300px; display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 25px;">
                            <input type="text" id="inputPassword" placeholder="Clave..." class="input-puzzle" />
                            <span id="mensajeFeedback" class="feedback"></span>
                        </div>

                        <button type="button" class="btn-entrar" id="btnResolver1">Resolver</button>
                    </div>

                    <!-- PUZZLE 2 -->
                    <div class="seccion-puzzle-corrediza" id="puzzleCorredizo2">
                        <button type="button" class="btn-retraer" id="btnRetraerPuzzle2" title="Esconder puzzle">
                            <img src="Imagenes/flecha.png" alt="Retraer" class="img-flecha" />
                        </button>

                        <h3 class="titulo-pilar" style="color: #ff1493; margin-top: 10px; margin-bottom: 20px;">Puzzle 2</h3>

                        <div class="links-wrap">
                            <div class="iconos-sociales">
                                <a href="https://www.roblox.com/users/221923489/profile" target="_blank" rel="noopener noreferrer">
                                    <img src="Imagenes/Roblox.png" alt="Roblox" class="icono-social" />
                                </a>
                                <a href="https://www.instagram.com/adrian_urizen/" target="_blank" rel="noopener noreferrer">
                                    <img src="Imagenes/Ig.png" alt="Instagram" class="icono-social" />
                                </a>
                                <a href="https://www.tiktok.com/@adrian_urizen" target="_blank" rel="noopener noreferrer">
                                    <img src="Imagenes/TikTok.png" alt="TikTok" class="icono-social" />
                                </a>
                            </div>

                            <div style="width: 80%; max-width: 300px; display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 12px;">
                                <input type="text" id="inputPassword2" placeholder="Clave..." class="input-puzzle" />
                                <span id="mensajeFeedback2" class="feedback"></span>
                            </div>

                            <button type="button" class="btn-entrar" id="btnResolver2">Responder</button>
                        </div>
                    </div>

                    <!-- PILAR 1 -->
                    <div class="seccion-card" id="pilar1">
                        <h3 class="titulo-pilar">Foto</h3>
                        <img src="Imagenes/Foto.png" alt="Contenido Sección 1" class="img-pilar" />
                        <button type="button" class="btn-entrar" id="btnEntrarPilar1">Entrar</button>
                    </div>

                    <!-- PILAR 2 -->
                    <div class="seccion-card pilar-bloqueado" id="pilar2">
                        <h3 class="titulo-pilar">Morse</h3>
                        <img src="Imagenes/Usuario.png" alt="Contenido Sección 2" class="img-pilar" />
                        <button type="button" class="btn-entrar bloqueado" id="btnEntrarPilar2">
                            <img src="Imagenes/Candado.png" alt="Bloqueado" class="img-candado" />
                        </button>
                    </div>

                    <!-- PILAR 3 -->
                    <div class="seccion-card pilar-bloqueado" id="pilar3">
                        <h3 class="titulo-pilar">Audio</h3>
                        <img src="Imagenes/Audio.png" alt="Contenido Sección 3" class="img-pilar" />
                        <button type="button" class="btn-entrar bloqueado" id="btnEntrarPilar3">
                            <img src="Imagenes/Candado.png" alt="Bloqueado" class="img-candado" />
                        </button>
                    </div>

                    <!-- PILAR 4 -->
                    <div class="seccion-card pilar-bloqueado" id="pilar4">
                        <h3 class="titulo-pilar">Binario</h3>
                        <img src="Imagenes/Binario.png" alt="Contenido Sección 4" class="img-pilar" />
                        <button type="button" class="btn-entrar bloqueado" id="btnEntrarPilar4">
                            <img src="Imagenes/Candado.png" alt="Bloqueado" class="img-candado" />
                        </button>
                    </div>

                    <!-- PILAR 5 -->
                    <div class="seccion-card pilar-bloqueado" id="pilar5">
                        <h3 class="titulo-pilar">64</h3>
                        <img src="Imagenes/64.png" alt="Contenido Sección 5" class="img-pilar" />
                        <button type="button" class="btn-entrar bloqueado" id="btnEntrarPilar5">
                            <img src="Imagenes/Candado.png" alt="Bloqueado" class="img-candado" />
                        </button>
                    </div>
                </div>

                <!-- FLECHA PARA IR A LA PANTALLA FINAL -->
                <button type="button" class="btn-flecha-final" id="btnFlechaFinal" title="Deslizar pantalla">
                    <img src="Imagenes/flecha.png" alt="Avanzar" class="img-flecha-final flecha-izquierda" />
                </button>
            </section>

            <!-- PANTALLA FINAL -->
            <section class="pantalla pantalla-final">
                <div class="particulas-layer particulas-final" id="particulasLayerFinal"></div>

                <div class="panel-final">
                    <h3 class="titulo-pilar">El link se fragmentó...</h3>

                    <div class="bloque-input">
                        <input
                            type="text"
                            id="inputLinkFinal"
                            placeholder="https://"
                            class="input-puzzle"
                        />
                        <span id="mensajeFinal" class="mensaje-final"></span>
                        <div style="font-size: 0.85rem; color: #ff1493; font-weight: 700; letter-spacing: 1px; text-align: center;">
                            la clave es: DRXFG
                        </div>

        const musicaAmbiente = document.getElementById('musicaAmbiente');
        const musicaFinal = document.getElementById('musicaFinal');

        const VOLUMEN_MUSICA = 0.35;
        const DURACION_FADE = 1200;

        let musicaSilenciada = false;
        let musicaOcultaPorSistema = false;
        let musicaIniciada = false;
        let musicaEnFinal = false;
        let musicaActual = musicaAmbiente;
        let fadeToken = 0;

        function actualizarIconoMusica() {
            iconoMusica.src = musicaSilenciada ? 'Imagenes/SDE.png' : 'Imagenes/SAC.png';
            iconoMusica.alt = musicaSilenciada ? 'Música muteada' : 'Música activa';
            btnMusica.title = musicaSilenciada ? 'Activar música' : 'Mutear música';
        }

        function aplicarEstadoAudio() {
            const debeEstarSilenciado = musicaSilenciada || musicaOcultaPorSistema;
            musicaAmbiente.muted = debeEstarSilenciado;
            musicaFinal.muted = debeEstarSilenciado;
        }

        function detenerAudios() {
            musicaAmbiente.pause();
            musicaFinal.pause();
        }

        function animarVolumen(audio, volumenInicial, volumenFinal, duracion = DURACION_FADE) {
            const token = ++fadeToken;

            return new Promise((resolve) => {
                const inicio = performance.now();

                audio.volume = volumenInicial;

                function paso(tiempoActual) {
                    if (token !== fadeToken) {
                        resolve(false);
                        return;
                    }

                    const progreso = Math.min((tiempoActual - inicio) / duracion, 1);
                    const volumen = volumenInicial + (volumenFinal - volumenInicial) * progreso;
                    audio.volume = Math.max(0, Math.min(1, volumen));

                    if (progreso < 1) {
                        requestAnimationFrame(paso);
                    } else {
                        resolve(true);
                    }
                }

                requestAnimationFrame(paso);
            });
        }

        async function reproducirMusica(audio, reiniciar = false) {
            musicaIniciada = true;
            aplicarEstadoAudio();

            if (reiniciar) {
                try {
                    audio.currentTime = 0;
                } catch (error) {
                    // Silencioso
                }
            }

            audio.volume = (musicaSilenciada || musicaOcultaPorSistema) ? VOLUMEN_MUSICA : 0;

            try {
                await audio.play();
            } catch (error) {
                // Silencioso si el navegador bloquea el audio
            }

            if (!musicaSilenciada && !musicaOcultaPorSistema) {
                animarVolumen(audio, 0, VOLUMEN_MUSICA, 250);
            }
        }

        async function hacerCrossfade(audioOrigen, audioDestino) {
            fadeToken++;

            musicaActual = audioDestino;
            musicaIniciada = true;
            aplicarEstadoAudio();

            try {
                audioDestino.currentTime = 0;
            } catch (error) {
                // Silencioso
            }

            audioDestino.volume = 0;

            try {
                await audioDestino.play();
            } catch (error) {
                // Silencioso
            }

            const origenEstabaSonando = audioOrigen && !audioOrigen.paused;

            if (origenEstabaSonando) {
                animarVolumen(audioOrigen, audioOrigen.volume || VOLUMEN_MUSICA, 0, DURACION_FADE).then(() => {
                    try {
                        audioOrigen.pause();
                        audioOrigen.currentTime = 0;
                    } catch (error) {
                        // Silencioso
                    }
                });
            }

            if (!musicaSilenciada && !musicaOcultaPorSistema) {
                animarVolumen(audioDestino, 0, VOLUMEN_MUSICA, DURACION_FADE);
            } else {
                audioDestino.volume = VOLUMEN_MUSICA;
            }
        }

        function iniciarMusicaAmbiente() {
            musicaEnFinal = false;
            musicaActual = musicaAmbiente;
            reproducirMusica(musicaAmbiente, true);
        }

        function cambiarAMusicaFinal() {
            if (musicaEnFinal) return;
            musicaEnFinal = true;
            hacerCrossfade(musicaAmbiente, musicaFinal);
        }

        function cambiarAMusicaAmbiente() {
            if (!musicaEnFinal && musicaActual === musicaAmbiente) return;
            musicaEnFinal = false;
            hacerCrossfade(musicaFinal, musicaAmbiente);
        }

        function pausarPorSistema() {
            musicaOcultaPorSistema = true;
            aplicarEstadoAudio();
            detenerAudios();
        }

        function reanudarPorSistema() {
            musicaOcultaPorSistema = false;
            aplicarEstadoAudio();

            if (!musicaIniciada) return;
            if (musicaSilenciada) return;

            const audioAReproducir = musicaActual || (musicaEnFinal ? musicaFinal : musicaAmbiente);
            audioAReproducir.play().catch(() => {});
        }

        btnMusica.addEventListener('click', () => {
            musicaSilenciada = !musicaSilenciada;
            actualizarIconoMusica();
            aplicarEstadoAudio();

            if (musicaSilenciada) {
                detenerAudios();
            } else if (musicaIniciada && !document.hidden) {
                const audioAReproducir = musicaActual || (musicaEnFinal ? musicaFinal : musicaAmbiente);
                audioAReproducir.play().catch(() => {});
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                pausarPorSistema();
            } else {
                reanudarPorSistema();
            }
        });

        window.addEventListener('blur', () => {
            pausarPorSistema();
        });

        window.addEventListener('focus', () => {
            reanudarPorSistema();
        });

        window.addEventListener('pagehide', () => {
            pausarPorSistema();
        });

        window.addEventListener('pageshow', () => {
            reanudarPorSistema();
        });

        // ==============================
        // EFECTOS DE ERROR / DESBLOQUEO
        // ==============================
        const sonidoError = document.getElementById('sonidoError');
        const sonidoDesbloqueo = document.getElementById('sonidoDesbloqueo');

        let timerHalo = null;
        let timerTemblor = null;

        function reproducirEfecto(audioEl, volumen = 0.7) {
            try {
                audioEl.pause();
                audioEl.currentTime = 0;
                audioEl.volume = volumen;
                audioEl.play().catch(() => {});
            } catch (error) {
                // Silencioso
            }
        }

        function activarTemblorPantalla() {
            contenidoPrincipal.classList.remove('temblor-activo');
            void contenidoPrincipal.offsetWidth;
            contenidoPrincipal.classList.add('temblor-activo');

            if (timerTemblor) {
                clearTimeout(timerTemblor);
            }

            timerTemblor = setTimeout(() => {
                contenidoPrincipal.classList.remove('temblor-activo');
            }, 480);
        }

        function mostrarHaloNeon() {
            haloNeon.classList.add('mostrar-halo');

            if (timerHalo) {
                clearTimeout(timerHalo);
            }

            timerHalo = setTimeout(() => {
                haloNeon.classList.remove('mostrar-halo');
            }, 900);
        }

        function efectoError() {
            reproducirEfecto(sonidoError, 0.7);
            activarTemblorPantalla();
        }

        function efectoExito() {
            reproducirEfecto(sonidoDesbloqueo, 0.7);
            mostrarHaloNeon();
        }

        // Sonidos
        const clickSoundSrc = 'Audios/Click.mp3';
        const bloqueoSoundSrc = 'Audios/Bloqueo.mp3';
        const hoverPilarSoundSrc = 'Audios/PilaresH.mp3';

        function reproducirSonido(src, volumen = 0.35) {
            try {
                const sonido = new Audio(src);
                sonido.volume = volumen;
                sonido.play().catch(() => {});
            } catch (error) {
                // Silencioso si el navegador bloquea el audio
            }
        }

        // Click en todos los botones
        document.addEventListener('click', (e) => {
            const boton = e.target.closest('button');
            if (!boton) return;

            const esBloqueado =
                boton.classList.contains('bloqueado') ||

        secciones.forEach((pilar) => {

        // Partículas
        function crearParticulas(layer, cantidad = 250) {
            const colores = ['rgba(255,20,147,1'];

            for (let i = 0; i < cantidad; i++) {
                const particula = document.createElement('span');
                particula.className = 'particula';

                const size = Math.random() * 4 + 2;
                const left = Math.random() * 100;
                const top = Math.random() * 100;
                const duration = Math.random() * 14 + 10;
                const delay = Math.random() * 10 * -1;
                const opacity = (Math.random() * 0.18 + 0.08).toFixed(2);
                const dx = (Math.random() * 120 - 60).toFixed(0) + 'px';
                const dy = (-100 - Math.random() * 180).toFixed(0) + 'px';
                const colorBase = colores[Math.floor(Math.random() * colores.length)];

                particula.style.width = `${size}px`;
                particula.style.height = `${size}px`;
                particula.style.left = `${left}%`;
                particula.style.top = `${top}%`;
                particula.style.background = `${colorBase}${opacity})`;
                particula.style.animationDuration = `${duration}s`;
                particula.style.animationDelay = `${delay}s`;
                particula.style.setProperty('--opacidad', opacity);
                particula.style.setProperty('--dx', dx);
                particula.style.setProperty('--dy', dy);

                layer.appendChild(particula);
            }
        }

        function mostrarBotonEmpezar() {
            btnEmpezar.style.display = 'block';
            btnEmpezar.classList.remove('ocultar');
            btnEmpezar.classList.remove('aparecer');
            void btnEmpezar.offsetWidth;
            btnEmpezar.classList.add('aparecer');

            btnEmpezar.classList.remove('aparecer');
            btnEmpezar.classList.add('ocultar');
        }

        function mostrarSecciones() {
            contenedorSecciones.classList.add('mostrar-contenedor');
            btnVolver.classList.add('mostrar-volver');

            secciones.forEach((seccion, index) => {
                setTimeout(() => {
                    seccion.classList.add('animar-seccion');
                }, 200 + (index * 120));
            });
        }

        function ocultarFlechaFinal() {
            btnFlechaFinal.classList.remove('mostrar-flecha-final');
        }

        function ocultarSecciones() {
            btnVolver.classList.remove('mostrar-volver');
            ocultarFlechaFinal();

            secciones.forEach((seccion, index) => {
                setTimeout(() => {
                    seccion.classList.remove('animar-seccion');
                }, (secciones.length - 1 - index) * 100);
            });

            setTimeout(() => {
                contenedorSecciones.classList.remove('mostrar-contenedor');
                mostrarBotonEmpezar();
            }, 900);
        }

        function bloquearMensaje(feedbackEl, color, texto) {
            feedbackEl.style.color = color;
            feedbackEl.textContent = texto;
        }

        function ocultarOtrosPilares(pilarActivo) {
            secciones.forEach(seccion => {
                if (seccion !== pilarActivo) {
                    seccion.classList.add('desvanecer-pilar');
                } else {
                    seccion.classList.remove('desvanecer-pilar');
                }
            });
        }

        function restaurarOtrosPilares() {
            secciones.forEach(seccion => {
                seccion.classList.remove('desvanecer-pilar');
                seccion.style.position = '';
                seccion.style.left = '';
                seccion.style.top = '';
                seccion.style.width = '';
                seccion.style.height = '';
                seccion.style.zIndex = '';
                seccion.style.transform = '';
                seccion.style.transition = '';
            });
        }

        function moverPilarAprimeraPosicion(pilar) {
            const contRect = contenedorSecciones.getBoundingClientRect();
            const pRect = pilar.getBoundingClientRect();
            const gap = 20;
            const targetWidth = (contRect.width - (gap * 4)) / 5;

            pilar.style.position = 'absolute';
            pilar.style.left = (pRect.left - contRect.left) + 'px';
            pilar.style.top = (pRect.top - contRect.top) + 'px';
            pilar.style.width = pRect.width + 'px';
            pilar.style.height = pRect.height + 'px';
            pilar.style.zIndex = '20';
            pilar.style.transition = 'left 0.6s cubic-bezier(0.25, 1, 0.5, 1), top 0.6s cubic-bezier(0.25, 1, 0.5, 1), width 0.6s cubic-bezier(0.25, 1, 0.5, 1), height 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)';

            requestAnimationFrame(() => {
                pilar.style.left = '0px';
                pilar.style.top = '0px';
                pilar.style.width = targetWidth + 'px';
                pilar.style.height = '100%';
                pilar.style.transform = 'scale(1.02)';
            });

            moverPilarAprimeraPosicion(pilar);

            setTimeout(() => {
                puzzle.classList.add('deslizar-puerta');

            if (inputPassword.value.trim() === "Powder") {
                bloquearMensaje(mensajeFeedback, "#00ffcc", "Muy bien, cuyeya.");
